services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: doc_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: tender_rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tender_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: doc_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: doc_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"   # MinIO console (optional, for debugging)
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: doc_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Application ───────────────────────────────────────────────────────────

  backend:
    build: ./backend
    container_name: doc_backend
    env_file: .env
    environment:
      # Override service URLs to use Docker service names
      DATABASE_URL: postgresql://admin:adminpassword@postgres:5432/tender_rag
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: doc_worker
    command: celery -A celery_worker worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://admin:adminpassword@postgres:5432/tender_rag
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      CELERY_WORKER: "1"
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: doc_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
